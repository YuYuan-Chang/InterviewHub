apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: interviewhub
  labels: { app: frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: interviewhub/frontend:dev
          imagePullPolicy: IfNotPresent
          env:
            # kube-dns ClusterIP (kind/kubeadm default) — nginx re-resolves service DNS through it
            - name: DNS_RESOLVER
              value: "10.96.0.10"
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: interviewhub
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 80
