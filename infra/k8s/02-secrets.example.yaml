# TEMPLATE ONLY — do not apply as-is and never commit real values.
# Create the real secret with infra/k8s/create-secrets.sh (reads infra/keys/*.pem).
apiVersion: v1
kind: Secret
metadata:
  name: interviewhub-secrets
  namespace: interviewhub
type: Opaque
stringData:
  JWT_PRIVATE_KEY_B64: "<base64 of infra/keys/jwt_private.pem>"
  JWT_PUBLIC_KEY_B64: "<base64 of infra/keys/jwt_public.pem>"
  INTERNAL_TOKEN: "<random hex>"
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  AUTH_DATABASE_URL: postgresql://auth_svc:auth_pw@postgres:5432/auth_db
  USER_DATABASE_URL: postgresql://user_svc:user_pw@postgres:5432/user_db
  POST_DATABASE_URL: postgresql://post_svc:post_pw@postgres:5432/post_db
  FILE_DATABASE_URL: postgresql://file_svc:file_pw@postgres:5432/file_db
  COMMENT_DATABASE_URL: postgresql://comment_svc:comment_pw@postgres:5432/comment_db
  NOTIFICATION_DATABASE_URL: postgresql://notification_svc:notification_pw@postgres:5432/notification_db
