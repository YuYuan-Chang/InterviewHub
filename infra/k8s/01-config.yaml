# Non-secret configuration shared by all services.
apiVersion: v1
kind: ConfigMap
metadata:
  name: interviewhub-config
  namespace: interviewhub
data:
  USER_SERVICE_URL: http://user-service:4002
  POST_SERVICE_URL: http://post-service:4003
  FILE_SERVICE_URL: http://file-service:4004
  NOTIFICATION_SERVICE_URL: http://notification-service:4006
  S3_ENDPOINT: http://minio:9000
  S3_BUCKET: interviewhub-files
