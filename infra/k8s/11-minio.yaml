# Dev-cluster object store. In production use S3/GCS and delete this file.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: interviewhub
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          imagePullPolicy: IfNotPresent # loaded into the node by kind-setup.sh
          args: ["server", "/data"]
          ports:
            - containerPort: 9000
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef: { name: interviewhub-secrets, key: S3_ACCESS_KEY }
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: { name: interviewhub-secrets, key: S3_SECRET_KEY }
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: 2Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: interviewhub
spec:
  selector: { app: minio }
  ports:
    - port: 9000
      targetPort: 9000
