name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck, build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma clients
        run: |
          for svc in auth user post file comment notification; do
            (cd services/$svc && npx prisma generate)
          done
      - name: Build all workspaces (shared, services, frontend typecheck)
        run: npm run build
      - name: Unit tests
        run: npm test

  e2e:
    name: End-to-end smoke test (compose)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate JWT keys and env
        run: ./scripts/generate-keys.sh
      - name: Build and start the full stack
        run: docker compose -f infra/compose.yaml up -d --build
      - name: Wait for all services to be healthy
        run: |
          for i in $(seq 1 60); do
            ok=0
            for p in 4001 4002 4003 4004 4005 4006; do
              curl -sf -m 2 "http://localhost:$p/healthz" > /dev/null && ok=$((ok+1))
            done
            [ "$ok" = 6 ] && exit 0
            sleep 3
          done
          echo "services never became healthy" >&2
          exit 1
      - name: Run smoke test through the gateway
        run: node scripts/smoke-test.mjs
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f infra/compose.yaml logs --tail 100
